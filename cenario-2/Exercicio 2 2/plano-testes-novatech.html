<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Testes — NovaTech RAG Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; color: #212529; }
  header { background: linear-gradient(135deg, #1F3864, #2F5496); color: white; padding: 28px 32px; }
  header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  header p { font-size: 13px; opacity: .85; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: 8px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-top: 3px solid #1F3864; }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #1F3864; }
  .stat-card .lbl { font-size: 11px; color: #6c757d; margin-top: 4px; text-transform: uppercase; letter-spacing: .4px; }

  /* Filters */
  .filters { background: white; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .filters label { font-size: 12px; font-weight: 600; color: #495057; }
  .filters select, .filters input { border: 1px solid #ced4da; border-radius: 4px; padding: 5px 10px; font-size: 13px; color: #212529; background: white; }
  .filters input { min-width: 200px; }
  .btn-reset { background: #e9ecef; border: 1px solid #ced4da; border-radius: 4px; padding: 5px 14px; font-size: 12px; cursor: pointer; color: #495057; }
  .btn-reset:hover { background: #dee2e6; }

  /* Table wrapper */
  .table-wrap { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #1F3864; color: white; padding: 11px 12px; text-align: left; font-size: 12px; font-weight: 600; white-space: nowrap; position: sticky; top: 0; z-index: 2; }
  tbody tr.tc-row { cursor: default; }
  tbody tr.tc-row:nth-child(4n+1) td, tbody tr.tc-row:nth-child(4n+2) td { background: #ffffff; }
  tbody tr.tc-row:nth-child(4n+3) td, tbody tr.tc-row:nth-child(4n+4) td { background: #f8f9fa; }
  tbody td { padding: 9px 12px; border-bottom: 1px solid #e9ecef; vertical-align: top; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .prio-Crítica  { background: #C00000; color: white; }
  .prio-Alta     { background: #FF6600; color: white; }
  .prio-Média    { background: #FFD700; color: #212529; }
  .prio-Baixa    { background: #92D050; color: #212529; }
  .bloq-sim      { background: #FF0000; color: white; font-weight: 700; }
  .bloq-nao      { background: #e9ecef; color: #6c757d; }
  .exec-Manual        { background: #FFF2CC; color: #6c5400; }
  .exec-Automatizado  { background: #E2EFDA; color: #2d5016; }
  .exec-Híbrido       { background: #DDEBF7; color: #1a3a5c; }
  .status-badge { background: #e9ecef; color: #6c757d; }
  .plan-Funcional { background: #EBF0F8; color: #1F3864; }
  .plan-Robustez  { background: #FFF3E0; color: #E65100; }

  /* Expand button */
  .btn-expand{background:none;border:1px solid #adb5bd;border-radius:4px;cursor:pointer;padding:2px 8px;font-size:11px;transition:all .2s;color:#495057;}
  .btn-expand:hover{background:#e9ecef;}
  .btn-expand.open{background:#1F3864;color:white;border-color:#1F3864;}

  /* Detail row */
  tr.detail-row{display:none;}
  tr.detail-row.visible{display:table-row;}
  tr.detail-row td{padding:16px 20px;background:#f8f9fb;border-bottom:2px solid #dee2e6;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .detail-card{border-radius:6px;padding:14px;border-left:4px solid;}
  .detail-card h4{margin:0 0 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .detail-card ol,.detail-card ul{margin:0;padding-left:18px;font-size:12px;line-height:1.7;color:#333;}
  .detail-card pre{margin:0;font-size:11px;white-space:pre-wrap;word-break:break-word;font-family:'Courier New',monospace;color:#333;line-height:1.6;}
  .card-steps{background:#EBF0F8;border-color:#1F3864;}
  .card-steps h4{color:#1F3864;}
  .card-expected{background:#E8F5E9;border-color:#2E7D32;}
  .card-expected h4{color:#2E7D32;}
  .card-data{background:#FFF8E1;border-color:#F57F17;}
  .card-data h4{color:#E65100;}
  @media(max-width:900px){.detail-grid{grid-template-columns:1fr;}}

  /* Count */
  .result-count { font-size: 12px; color: #6c757d; padding: 8px 20px; border-top: 1px solid #e9ecef; }

  /* Section divider rows */
  tr.section-header td { background: #2F5496 !important; color: white; font-weight: 700; font-size: 12px; padding: 7px 12px; }
</style>
</head>

function toggleDetail(btn, tcId) {
  const row = document.getElementById('detail-' + tcId);
  if (!row) return;
  const isOpen = row.classList.contains('visible');
  row.classList.toggle('visible', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '▶' : '▼';
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(tc => {
    const colCount = 12;
    // Main TC row
    const tr = document.createElement('tr');
    tr.className = 'tc-row';
    tr.dataset.id = tc.id;
    tr.dataset.plan = tc.plan;
    tr.dataset.prio = tc.prio;
    tr.dataset.bloq = tc.bloq;
    tr.dataset.exec = tc.exec;
    tr.dataset.search = (tc.id + ' ' + tc.title + ' ' + tc.desc).toLowerCase();

    const stepsHtml = tc.steps.map(s => `<li>${escHtml(s)}</li>`).join('');
    const expectedHtml = tc.expected.map(e => `<li>${escHtml(e)}</li>`).join('');

    tr.innerHTML = `
      <td><button class="btn-expand" onclick="toggleDetail(this,'${escHtml(tc.id)}')">▶</button></td>
      <td><strong>${escHtml(tc.id)}</strong></td>
      <td>${escHtml(tc.title)}<br><small style="color:#6c757d">${escHtml(tc.desc)}</small></td>
      <td><span class="badge plan-${escHtml(tc.plan)}">${escHtml(tc.plan)}</span></td>
      <td><small>${escHtml(tc.group)}</small></td>
      <td><small>${escHtml(tc.vcs)}</small></td>
      <td><span class="badge prio-${escHtml(tc.prio)}">${escHtml(tc.prio)}</span></td>
      <td><span class="badge ${tc.bloq==='Sim'?'bloq-sim':'bloq-nao'}">${escHtml(tc.bloq)}</span></td>
      <td><span class="badge exec-${escHtml(tc.exec)}">${escHtml(tc.exec)}</span></td>
      <td><small>${escHtml(tc.tool)}</small></td>
      <td><span class="badge status-badge">${escHtml(tc.status)}</span></td>
      <td><small>${escHtml(tc.obs)}</small></td>
    `;

    // Detail row
    const dtr = document.createElement('tr');
    dtr.className = 'detail-row';
    dtr.id = 'detail-' + tc.id;
    dtr.innerHTML = `
      <td colspan="${colCount}">
        <div class="detail-grid">
          <div class="detail-card card-steps">
            <h4>🔢 Passo a Passo</h4>
            <ol>${stepsHtml}</ol>
          </div>
          <div class="detail-card card-expected">
            <h4>✅ Resultado Esperado</h4>
            <ul>${expectedHtml}</ul>
          </div>
          <div class="detail-card card-data">
            <h4>📋 Massa de Teste / Insumos</h4>
            <pre>${escHtml(tc.testData)}</pre>
          </div>
        </div>
      </td>
    `;

    tbody.appendChild(tr);
    tbody.appendChild(dtr);
  });
  document.getElementById('result-count').textContent = `Exibindo ${data.length} de ${tcs.length} casos de teste`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function applyFilters() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const plan   = document.getElementById('f-plan').value;
  const prio   = document.getElementById('f-prio').value;
  const bloq   = document.getElementById('f-bloq').value;
  const exec   = document.getElementById('f-exec').value;

  const filtered = tcs.filter(tc => {
    if (search && !(tc.id + ' ' + tc.title + ' ' + tc.desc).toLowerCase().includes(search)) return false;
    if (plan && tc.plan !== plan) return false;
    if (prio && tc.prio !== prio) return false;
    if (bloq && tc.bloq !== bloq) return false;
    if (exec && tc.exec !== exec) return false;
    return true;
  });

  // Show/hide rows (preserve detail-rows, just hide/show tc-rows)
  const tbody = document.getElementById('tbody');
  const allTcRows = tbody.querySelectorAll('tr.tc-row');
  const allDetailRows = tbody.querySelectorAll('tr.detail-row');

  const filteredIds = new Set(filtered.map(tc => tc.id));

  allTcRows.forEach(row => {
    row.style.display = filteredIds.has(row.dataset.id) ? '' : 'none';
  });
  allDetailRows.forEach(row => {
    const tcId = row.id.replace('detail-','');
    if (!filteredIds.has(tcId)) {
      row.classList.remove('visible');
      row.style.display = 'none';
    } else {
      row.style.display = '';
      // If it was open but tc got hidden (not the case here), reset
    }
  });

  document.getElementById('result-count').textContent = `Exibindo ${filtered.length} de ${tcs.length} casos de teste`;
}

function resetFilters() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-plan').value = '';
  document.getElementById('f-prio').value = '';
  document.getElementById('f-bloq').value = '';
  document.getElementById('f-exec').value = '';
  applyFilters();
}

// Initial render
renderTable(tcs);
</script>
